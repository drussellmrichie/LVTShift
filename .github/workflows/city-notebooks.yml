name: Run City Notebooks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cities/*/model.ipynb'
      - 'lvt/**'
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/city-notebooks.yml'
  schedule:
    - cron: '0 6 * * 1'  # Mondays 6 AM UTC

jobs:
  run-city:
    name: Run ${{ matrix.city }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    # Cities that are known-incomplete or whose source data is WAF-blocked in CI
    # are allowed to fail without marking the whole workflow red.
    continue-on-error: ${{ contains(fromJson('["bryan","college_station","cincinnati","denver","morgantown","scranton"]'), matrix.city) }}
    strategy:
      fail-fast: false
      matrix:
        city:
          - baltimore
          - bellingham
          - bryan           # BCAD shapefile — brazoscad.org blocks CI IPs
          - charlottesville
          - cincinnati      # no public parcel download URL
          - cleveland
          - college_station # BCAD shapefile — brazoscad.org blocks CI IPs
          - denver          # incomplete — export cell is a TODO
          - fort_collins
          - greeley
          - highlands_ranch
          - morgantown      # incomplete — modeling not yet done
          - philadelphia
          - pueblo
          - rochester
          - scranton        # incomplete — only data fetch implemented
          - southbend
          - spokane
          - st_paul
          - syracuse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt jupyter nbconvert ipykernel pyarrow
          python -m ipykernel install --sys-prefix --name lvtshift --display-name "LVTShift"

      - name: Verify environment
        run: |
          python -c "import geopandas, pandas, numpy, matplotlib, seaborn, shapely, requests, dotenv, census, us; print('All imports OK')"
          python -m jupyter kernelspec list

      - name: Write .env
        run: echo "CENSUS_API_KEY=$CENSUS_API_KEY" > .env
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

      - name: Run notebook
        id: run_nb
        run: |
          set -o pipefail
          python scripts/run_notebook_ci.py ${{ matrix.city }} 2>&1 | tee /tmp/nb-${{ matrix.city }}.log

      - name: Annotate error
        if: failure() && steps.run_nb.outcome == 'failure'
        run: |
          msg=$(tail -60 /tmp/nb-${{ matrix.city }}.log \
            | sed 's/\x1b\[[0-9;]*[mGKH]//g' \
            | tr '\n' '|')
          echo "::error title=${{ matrix.city }} notebook error::$msg"

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ matrix.city }}
          path: /tmp/nb-${{ matrix.city }}.log
          if-no-files-found: warn

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: city-csv-${{ matrix.city }}
          path: analysis/data/${{ matrix.city }}.csv
          if-no-files-found: warn

  collect:
    name: Collect all CSVs
    needs: run-city
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo to commit CSVs
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all city CSVs
        uses: actions/download-artifact@v4
        with:
          pattern: city-csv-*
          path: csvs
          merge-multiple: true

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-city-csvs
          path: csvs/
          if-no-files-found: warn

      - name: Commit CSVs to ci-analysis-data branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B ci-analysis-data
          mkdir -p analysis/data
          cp csvs/*.csv analysis/data/ 2>/dev/null || echo "No CSVs to copy"
          git add -f analysis/data/*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No CSV changes to commit"
          else
            git commit -m "ci: update city analysis CSVs [skip ci]"
            git push -f origin ci-analysis-data
          fi
