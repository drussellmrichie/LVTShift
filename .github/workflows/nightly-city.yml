name: Nightly LVT City Model

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:
    inputs:
      city_override:
        description: 'City slug to model (e.g. pittsburgh). Leave blank for auto-selection from candidates.json.'
        required: false
        type: string

jobs:
  model-city:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt jupyter nbconvert

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write .env
        run: echo "CENSUS_API_KEY=${{ secrets.CENSUS_API_KEY }}" > .env

      - name: Select city
        id: city
        run: |
          if [ -n "${{ inputs.city_override }}" ]; then
            echo "slug=${{ inputs.city_override }}" >> "$GITHUB_OUTPUT"
          else
            SLUG=$(python scripts/select_next_city.py)
            echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push feature branch
        run: |
          BRANCH="nightly/${{ steps.city.outputs.slug }}-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Configure git identity
        run: |
          git config user.name "LVTShift Nightly"
          git config user.email "nightly@lvtshift.org"

      - name: Build and run nightly prompt
        run: |
          export TODAY=$(date +%Y-%m-%d)
          export CITY="${{ steps.city.outputs.slug }}"
          PROMPT=$(envsubst < .claude/nightly-city-prompt.md)
          claude -p "$PROMPT" --dangerously-skip-permissions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Safety-net commit and push
        # Catches anything the Claude session left uncommitted
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "nightly: cleanup — uncommitted files after session"
          fi
          git push origin "$BRANCH" || true

      - name: Create draft pull request
        run: |
          CITY="${{ steps.city.outputs.slug }}"
          gh pr create \
            --title "Nightly: LVT model for ${CITY}" \
            --body "$(cat <<EOF
          Automated overnight LVTShift pipeline run.

          **City:** ${CITY}
          **Date:** $(date +%Y-%m-%d)
          **Branch:** $BRANCH

          ## Review checklist
          - [ ] Revenue validates within 10%
          - [ ] Census join looks correct
          - [ ] 7 PNGs generated in \`analysis/reports/${CITY}/\`
          - [ ] Political viability brief at \`analysis/political/${CITY}.md\`
          - [ ] \`analysis/data/${CITY}.csv\` export present
          - [ ] \`cross_city.ipynb\` re-executed with new city included
          EOF
          )" \
            --draft \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
